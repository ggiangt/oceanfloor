<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dreamy Pastel Tree Canopy</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef9ef;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: min(4vw, 40px);
      background:
        radial-gradient(circle at 50% 20%, rgba(35, 93, 138, 0.35), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(69, 143, 190, 0.18), transparent 26%),
        linear-gradient(180deg, #0b2940 0%, #061a2a 100%);
    }

    .composition {
      width: min(60vw, 1120px);
      aspect-ratio: 1.28 / 1;
      background: transparent;
      border-radius: 52px;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 52px;
      filter: blur(0.15px);
      -webkit-mask-image:
        linear-gradient(to right,
          rgba(0, 0, 0, 0.0) 0%,
          rgba(0, 0, 0, 0.88) 6%,
          rgba(0, 0, 0, 1.0) 12%,
          rgba(0, 0, 0, 1.0) 88%,
          rgba(0, 0, 0, 0.88) 94%,
          rgba(0, 0, 0, 0.0) 100%
        ),
        linear-gradient(to bottom,
          rgba(0, 0, 0, 0.0) 0%,
          rgba(0, 0, 0, 0.88) 6%,
          rgba(0, 0, 0, 1.0) 12%,
          rgba(0, 0, 0, 1.0) 88%,
          rgba(0, 0, 0, 0.88) 94%,
          rgba(0, 0, 0, 0.0) 100%
        );
      -webkit-mask-composite: source-in;
      mask-image:
        linear-gradient(to right,
          rgba(0, 0, 0, 0.0) 0%,
          rgba(0, 0, 0, 0.88) 6%,
          rgba(0, 0, 0, 1.0) 12%,
          rgba(0, 0, 0, 1.0) 88%,
          rgba(0, 0, 0, 0.88) 94%,
          rgba(0, 0, 0, 0.0) 100%
        ),
        linear-gradient(to bottom,
          rgba(0, 0, 0, 0.0) 0%,
          rgba(0, 0, 0, 0.88) 6%,
          rgba(0, 0, 0, 1.0) 12%,
          rgba(0, 0, 0, 1.0) 88%,
          rgba(0, 0, 0, 0.88) 94%,
          rgba(0, 0, 0, 0.0) 100%
        );
      mask-composite: intersect;
    }

  </style>
</head>
<body>
  <div class="composition" id="composition"></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const composition = document.getElementById("composition");

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    composition.appendChild(renderer.domElement);

    const jellyAudio = new Audio("file:///Users/giangtran/Downloads/533979__kaekhor__jellyfish.wav");
    jellyAudio.preload = "auto";
    jellyAudio.loop = true;
    jellyAudio.volume = 0.18;

    const uniforms = {
      uTime: { value: 0 },
      uResolution: { value: new THREE.Vector2(1, 1) },
      uMouse: { value: new THREE.Vector2(0.72, 0.3) },
      debugMode: { value: 0 }
    };

    const material = new THREE.ShaderMaterial({
      uniforms,
      vertexShader: `
        varying vec2 vUv;

        void main() {
          vUv = uv;
          gl_Position = vec4(position.xy, 0.0, 1.0);
        }
      `,
      fragmentShader: `
        precision highp float;

        varying vec2 vUv;

        uniform float uTime;
        uniform vec2 uResolution;
        uniform vec2 uMouse;
        uniform int debugMode;

        float hash(vec2 p) {
          p = fract(p * vec2(123.34, 345.45));
          p += dot(p, p + 34.345);
          return fract(p.x * p.y);
        }

        float noise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);

          float a = hash(i);
          float b = hash(i + vec2(1.0, 0.0));
          float c = hash(i + vec2(0.0, 1.0));
          float d = hash(i + vec2(1.0, 1.0));

          vec2 u = f * f * (3.0 - 2.0 * f);

          return mix(a, b, u.x) +
                 (c - a) * u.y * (1.0 - u.x) +
                 (d - b) * u.x * u.y;
        }

        float fbm(vec2 p) {
          float sum = 0.0;
          float amp = 0.5;

          for (int i = 0; i < 5; i++) {
            sum += amp * noise(p);
            p *= 2.02;
            amp *= 0.5;
          }

          return sum;
        }

        vec2 warp(vec2 p) {
          float t = uTime * 0.08;
          vec2 q = vec2(
            fbm(p + vec2(0.0, t)),
            fbm(p + vec2(3.1, -t))
          );
          vec2 r = vec2(
            fbm(p + 2.0 * q + vec2(1.7, 9.2) + t),
            fbm(p + 2.0 * q + vec2(8.3, 2.8) - t)
          );
          return r;
        }

        float softCircle(vec2 p, vec2 c, float radius, float blur) {
          float d = length(p - c);
          return 1.0 - smoothstep(radius, radius + blur, d);
        }

        float softLine(vec2 p, vec2 a, vec2 b, float radius, float blur) {
          vec2 pa = p - a;
          vec2 ba = b - a;
          float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
          float d = length(pa - ba * h);
          return 1.0 - smoothstep(radius, radius + blur, d);
        }

        float jellyfishShape(vec2 p, vec2 center, float scale, float phase, float angle) {
          vec2 q = (p - center) / scale;
          float c = cos(angle);
          float s = sin(angle);
          q = mat2(c, -s, s, c) * q;
          q.y *= -1.0;
          q.x *= 0.95;
          q.y -= 0.10;

          float pulse = 0.84 + 0.26 * sin(phase);
          float wobbleA = 0.10 * sin(phase * 1.3 + q.y * 4.0);
          float wobbleB = 0.08 * cos(phase * 0.9 + q.x * 5.2);
          vec2 bellWarp = q;
          bellWarp.x += wobbleA * (0.6 - clamp(q.y, -0.4, 0.6));
          bellWarp.y += wobbleB * 0.18;

          float bell = softCircle(bellWarp * vec2(0.96 + 0.08 * sin(phase * 0.7), 1.10 / pulse), vec2(0.0, 0.03), 0.58, 0.22);
          bell *= 1.0 - smoothstep(0.02, 0.48, q.y);

          float rim = bell - softCircle(bellWarp * vec2(0.98 + 0.06 * cos(phase * 0.8), 1.04 / pulse), vec2(0.0, 0.04), 0.47, 0.18);
          rim = max(rim, 0.0);

          float lobeA = softCircle(q * vec2(1.55, 1.7), vec2(-0.12 + 0.03 * sin(phase), 0.10), 0.16, 0.14);
          float lobeB = softCircle(q * vec2(1.55, 1.7), vec2(0.12 + 0.03 * cos(phase * 0.9), 0.10), 0.16, 0.14);
          float lobeC = softCircle(q * vec2(1.45, 1.6), vec2(0.00, -0.02 + 0.02 * sin(phase * 1.1)), 0.18, 0.14);
          float innerGlow = max(max(lobeA, lobeB), lobeC) * bell;

          float oralA = softLine(q, vec2(-0.06, 0.08), vec2(-0.10 + 0.05 * sin(phase), 0.54), 0.024, 0.10);
          float oralB = softLine(q, vec2(0.03, 0.10), vec2(0.10 + 0.06 * cos(phase * 0.8), 0.62), 0.028, 0.11);
          float oralC = softLine(q, vec2(0.00, 0.02), vec2(0.00 + 0.04 * sin(phase * 1.2), 0.44), 0.020, 0.09);

          vec2 t1a = vec2(-0.22, 0.00);
          vec2 t1b = vec2(-0.28 + 0.07 * sin(phase * 0.8), 0.30);
          vec2 t1c = vec2(-0.20 + 0.12 * sin(phase * 0.8 + 0.8), 0.64);
          vec2 t1d = vec2(-0.30 + 0.10 * sin(phase * 0.8 + 1.6), 0.98);
          float tentacle1 = max(
            softLine(q, t1a, t1b, 0.012, 0.080),
            max(
              softLine(q, t1b, t1c, 0.011, 0.076),
              max(
                softLine(q, t1c, t1d, 0.010, 0.072),
                max(softCircle(q, t1b, 0.020, 0.055), softCircle(q, t1c, 0.018, 0.050))
              )
            )
          );

          vec2 t2a = vec2(-0.06, 0.02);
          vec2 t2b = vec2(-0.12 + 0.05 * cos(phase * 0.9), 0.34);
          vec2 t2c = vec2(-0.02 + 0.08 * cos(phase * 0.9 + 0.9), 0.70);
          vec2 t2d = vec2(-0.14 + 0.08 * cos(phase * 0.9 + 1.7), 1.04);
          float tentacle2 = max(
            softLine(q, t2a, t2b, 0.011, 0.076),
            max(
              softLine(q, t2b, t2c, 0.010, 0.072),
              max(
                softLine(q, t2c, t2d, 0.009, 0.068),
                max(softCircle(q, t2b, 0.018, 0.050), softCircle(q, t2c, 0.016, 0.046))
              )
            )
          );

          vec2 t3a = vec2(0.10, 0.02);
          vec2 t3b = vec2(0.16 + 0.05 * sin(phase * 1.0), 0.36);
          vec2 t3c = vec2(0.04 + 0.09 * sin(phase * 1.0 + 0.8), 0.74);
          vec2 t3d = vec2(0.16 + 0.08 * sin(phase * 1.0 + 1.5), 1.08);
          float tentacle3 = max(
            softLine(q, t3a, t3b, 0.011, 0.076),
            max(
              softLine(q, t3b, t3c, 0.010, 0.072),
              max(
                softLine(q, t3c, t3d, 0.009, 0.068),
                max(softCircle(q, t3b, 0.018, 0.050), softCircle(q, t3c, 0.016, 0.046))
              )
            )
          );

          vec2 t4a = vec2(0.24, 0.00);
          vec2 t4b = vec2(0.30 + 0.07 * cos(phase * 0.75), 0.30);
          vec2 t4c = vec2(0.22 + 0.12 * cos(phase * 0.75 + 0.8), 0.62);
          vec2 t4d = vec2(0.32 + 0.10 * cos(phase * 0.75 + 1.6), 0.94);
          float tentacle4 = max(
            softLine(q, t4a, t4b, 0.012, 0.080),
            max(
              softLine(q, t4b, t4c, 0.011, 0.076),
              max(
                softLine(q, t4c, t4d, 0.010, 0.072),
                max(softCircle(q, t4b, 0.020, 0.055), softCircle(q, t4c, 0.018, 0.050))
              )
            )
          );

          float tentacleDrift = 0.88 + 0.12 * sin(phase * 0.6 + q.y * 3.0);
          float tentacles = (tentacle1 + tentacle2 + tentacle3 + tentacle4) * 0.32 * tentacleDrift;
          float oralArms = (oralA + oralB + oralC) * 0.58;
          return bell + rim * 0.9 + innerGlow * 0.7 + oralArms + tentacles;
        }

        vec3 pastelPalette(float t) {
          vec3 deep = vec3(0.03, 0.21, 0.34);
          vec3 teal = vec3(0.02, 0.50, 0.60);
          vec3 aqua = vec3(0.12, 0.79, 0.82);
          vec3 foam = vec3(0.82, 0.98, 0.90);

          vec3 c = mix(deep, teal, smoothstep(0.10, 0.45, t));
          c = mix(c, aqua, smoothstep(0.32, 0.78, t));
          c = mix(c, foam, smoothstep(0.72, 1.0, t));
          return c;
        }

        float luminance(vec3 c) {
          return dot(c, vec3(0.299, 0.587, 0.114));
        }

        void main() {
          vec2 uv = vUv;
          vec2 p = uv - 0.5;
          p.x *= uResolution.x / uResolution.y;

          float t = uTime;
          vec2 mouse = (uMouse - 0.5) * vec2(uResolution.x / uResolution.y, 1.0);

          vec2 flow = warp(p * 2.0 + vec2(0.0, -t * 0.03));
          vec2 drifted = p + (flow - 0.5) * 0.28;

          float mist = fbm(drifted * 2.5 + vec2(0.0, t * 0.03));
          float wash = fbm(drifted * 4.6 - vec2(t * 0.025, 0.0));

          vec3 color = mix(
            vec3(0.18, 0.68, 0.74),
            vec3(0.03, 0.24, 0.38),
            smoothstep(-0.35, 0.8, p.y + mist * 0.15)
          );

          float canopyBase = fbm(drifted * 3.2 + vec2(0.0, t * 0.015));
          float canopyDetail = fbm((drifted + flow * 0.18) * 8.0 - vec2(t * 0.02, -t * 0.01));
          float canopyMask = smoothstep(0.26, 0.7, canopyBase + canopyDetail * 0.34);
          canopyMask *= 1.0 - smoothstep(0.1, 0.95, length((p - vec2(0.0, 0.1)) * vec2(0.85, 1.15)));
          float leafSpeckleA = smoothstep(0.52, 0.82, fbm((drifted + flow * 0.15) * 11.5 + vec2(0.0, t * 0.03)));
          float leafSpeckleB = smoothstep(0.58, 0.86, fbm((drifted - flow * 0.12 + vec2(4.2, 1.3)) * 15.0 - vec2(t * 0.025, 0.0)));
          float leafSpeckle = mix(leafSpeckleA, leafSpeckleB, 0.45);
          canopyMask *= 0.55 + leafSpeckle * 0.95;
          canopyMask = clamp(canopyMask, 0.0, 1.0);

          vec3 canopyColor = mix(
            vec3(0.04, 0.30, 0.44),
            vec3(0.10, 0.74, 0.76),
            canopyDetail
          );
          canopyColor = mix(canopyColor, vec3(0.70, 0.97, 0.92), wash * 0.16);
          canopyColor *= 0.82 + leafSpeckle * 0.35;
          color = mix(color, canopyColor, canopyMask * 0.92);

          vec2 trunkWarp = p + vec2((fbm(p * 5.0 + vec2(0.0, t * 0.05)) - 0.5) * 0.05, 0.0);
          float trunk = softLine(trunkWarp, vec2(-0.02, -1.0), vec2(0.03, 0.62), 0.13, 0.22);
          float trunkGlow = softLine(trunkWarp, vec2(-0.03, -1.0), vec2(0.04, 0.64), 0.18, 0.34);

          float branchA = softLine(trunkWarp, vec2(-0.04, -0.28), vec2(-0.64, -0.78), 0.09, 0.19);
          float branchB = softLine(trunkWarp, vec2(-0.01, 0.04), vec2(-0.32, 0.42), 0.07, 0.17);
          float branchC = softLine(trunkWarp, vec2(0.05, 0.08), vec2(0.32, 0.55), 0.06, 0.16);
          float branchD = softLine(trunkWarp, vec2(0.01, 0.26), vec2(0.19, 0.72), 0.05, 0.14);
          float branches = max(max(branchA, branchB), max(branchC, branchD));

          float trunkMask = max(trunk, branches * 0.98);
          vec3 trunkColor = mix(vec3(0.04, 0.35, 0.48), vec3(0.18, 0.58, 0.62), mist);
          trunkColor = mix(trunkColor, vec3(0.74, 0.95, 0.88), trunkGlow * 0.45);
          color = mix(color, trunkColor, trunkMask * 0.9);
          color += vec3(0.13, 0.17, 0.12) * trunkGlow * 0.06;

          float leafCloud1 = smoothstep(0.42, 0.84, fbm((p + vec2(-0.28, 0.16) + flow * 0.22) * 5.2));
          float leafCloud2 = smoothstep(0.46, 0.88, fbm((p + vec2(0.26, 0.1) - flow * 0.18) * 5.8));
          float leafCloud3 = smoothstep(0.40, 0.82, fbm((p + vec2(0.0, 0.42) + flow * 0.28) * 4.9));
          float leafShape = (leafCloud1 + leafCloud2 + leafCloud3) / 3.0;
          leafShape *= 1.0 - smoothstep(0.15, 0.9, length((p - vec2(0.0, 0.12)) * vec2(0.95, 1.15)));
          leafShape *= 0.45 + leafSpeckle * 0.9;
          leafShape = clamp(leafShape, 0.0, 1.0);

          vec3 leafGlow = mix(vec3(0.05, 0.52, 0.58), vec3(0.50, 0.92, 0.84), wash);
          color += leafGlow * leafShape * 0.2;

          vec2 sunPos = vec2(0.02, 0.20);
          vec2 sunDelta = p - sunPos;
          vec2 causticUv = (p + flow * 0.12) * 6.8;
          float causticA = fbm(causticUv + vec2(t * 0.10, -t * 0.07));
          float causticB = fbm(causticUv * 1.23 - vec2(t * 0.06, t * 0.04) + vec2(3.8, 1.4));
          float causticC = fbm(causticUv * 0.82 + vec2(-2.1, 5.6) + vec2(-t * 0.05, t * 0.03));
          float patchA = smoothstep(0.54, 0.82, causticA * 0.7 + causticB * 0.3);
          float patchB = smoothstep(0.50, 0.8, causticB * 0.6 + causticC * 0.4);
          float patchC = smoothstep(0.58, 0.86, causticC * 0.75 + causticA * 0.25);
          float patchD = smoothstep(0.52, 0.78, fbm(causticUv * 0.56 + vec2(8.4, 2.6) + vec2(t * 0.03, -t * 0.02)));
          float patchE = smoothstep(0.56, 0.82, fbm(causticUv * 0.72 + vec2(-6.2, 4.1) + vec2(-t * 0.02, t * 0.025)));
          float webRipple = max(max(patchA, patchB * 0.8), max(patchC * 0.65, patchD * 0.75));
          webRipple = max(webRipple, patchE * 0.6);
          float sunDist = length(sunDelta * vec2(0.90, 1.45));
          float topPocket = 1.0 - smoothstep(0.18, 0.70, length((p - vec2(0.02, 0.18)) * vec2(0.95, 1.65)));
          float webEnvelope = (1.0 - smoothstep(0.14, 0.82, sunDist + (flow.x - 0.5) * 0.01)) * topPocket;
          float centerMist = softCircle(p + flow * 0.02, sunPos + vec2(0.03, -0.01), 0.18, 0.22);
          float sunCore = webRipple * webEnvelope;
          float sunBloom = mix(centerMist, webRipple, 0.55) * webEnvelope;
          float sunScatter = softCircle(p + flow * 0.02, sunPos + vec2(0.00, -0.02), 0.34, 0.24) * (0.16 + webRipple * 0.22) * topPocket;
          float dappleEnvelope = 1.0 - smoothstep(0.10, 0.52, length((p - vec2(0.02, 0.24)) * vec2(0.95, 2.1)));
          vec2 dappleDriftA = vec2(sin(t * 0.22 + 0.6), cos(t * 0.18 + 0.2)) * 0.012;
          vec2 dappleDriftB = vec2(sin(t * 0.27 + 1.4), cos(t * 0.21 + 1.1)) * 0.010;
          vec2 dappleDriftC = vec2(sin(t * 0.19 + 2.1), cos(t * 0.24 + 2.7)) * 0.014;
          vec2 dappleDriftD = vec2(sin(t * 0.23 + 3.0), cos(t * 0.17 + 3.5)) * 0.011;
          vec2 dappleDriftE = vec2(sin(t * 0.18 + 4.2), cos(t * 0.20 + 4.6)) * 0.013;
          vec2 dappleDriftF = vec2(sin(t * 0.25 + 5.1), cos(t * 0.22 + 5.5)) * 0.009;
          vec2 dappleDriftG = vec2(sin(t * 0.28 + 0.9), cos(t * 0.19 + 1.8)) * 0.008;
          vec2 dappleDriftH = vec2(sin(t * 0.21 + 1.9), cos(t * 0.23 + 0.7)) * 0.010;
          vec2 dappleDriftI = vec2(sin(t * 0.24 + 2.8), cos(t * 0.18 + 2.0)) * 0.009;
          vec2 dappleDriftJ = vec2(sin(t * 0.20 + 3.7), cos(t * 0.22 + 3.1)) * 0.011;
          vec2 dappleDriftK = vec2(sin(t * 0.26 + 4.8), cos(t * 0.17 + 4.4)) * 0.008;
          float dappleNoise = 0.82 + 0.18 * fbm((p + flow * 0.02) * 10.0 + vec2(t * 0.05, -t * 0.04));
          float dappleSoft = 0.88 + 0.12 * fbm((p - flow * 0.015) * 7.5 + vec2(-t * 0.03, t * 0.02));
          float dappleA = softCircle(p + flow * 0.010, vec2(-0.24, 0.29) + dappleDriftA, 0.010, 0.026) * (0.55 + 0.45 * sin(t * 0.62 + 0.4)) * dappleNoise * dappleSoft;
          float dappleB = softCircle(p - flow * 0.008, vec2(-0.18, 0.24) + dappleDriftB, 0.007, 0.021) * (0.55 + 0.45 * sin(t * 0.84 + 1.6)) * dappleNoise * dappleSoft;
          float dappleC = softCircle(p + flow * 0.012, vec2(-0.11, 0.27) + dappleDriftC, 0.012, 0.028) * (0.55 + 0.45 * sin(t * 0.58 + 2.2)) * dappleNoise * dappleSoft;
          float dappleD = softCircle(p - flow * 0.010, vec2(-0.03, 0.23) + dappleDriftD, 0.008, 0.023) * (0.55 + 0.45 * sin(t * 0.78 + 3.0)) * dappleNoise * dappleSoft;
          float dappleE = softCircle(p + flow * 0.008, vec2(0.04, 0.29) + dappleDriftE, 0.013, 0.030) * (0.55 + 0.45 * sin(t * 0.49 + 4.1)) * dappleNoise * dappleSoft;
          float dappleF = softCircle(p + flow * 0.006, vec2(0.10, 0.25) + dappleDriftF, 0.009, 0.024) * (0.55 + 0.45 * sin(t * 0.72 + 5.0)) * dappleNoise * dappleSoft;
          float dappleG = softCircle(p - flow * 0.007, vec2(0.16, 0.20) + dappleDriftG, 0.006, 0.019) * (0.55 + 0.45 * sin(t * 0.91 + 0.9)) * dappleNoise * dappleSoft;
          float dappleH = softCircle(p + flow * 0.009, vec2(0.22, 0.27) + dappleDriftH, 0.011, 0.027) * (0.55 + 0.45 * sin(t * 0.66 + 2.7)) * dappleNoise * dappleSoft;
          float dappleI = softCircle(p - flow * 0.006, vec2(0.28, 0.23) + dappleDriftI, 0.007, 0.021) * (0.55 + 0.45 * sin(t * 0.88 + 5.5)) * dappleNoise * dappleSoft;
          float dappleJ = softCircle(p + flow * 0.010, vec2(0.34, 0.28) + dappleDriftJ, 0.012, 0.027) * (0.55 + 0.45 * sin(t * 0.57 + 1.9)) * dappleNoise * dappleSoft;
          float dappleK = softCircle(p - flow * 0.005, vec2(0.40, 0.22) + dappleDriftK, 0.006, 0.019) * (0.55 + 0.45 * sin(t * 0.93 + 3.9)) * dappleNoise * dappleSoft;
          float sunDapple = (dappleA + dappleB + dappleC + dappleD + dappleE + dappleF + dappleG + dappleH + dappleI + dappleJ + dappleK) * dappleEnvelope;
          vec3 sunColor = vec3(0.88, 0.98, 0.95);
          color += sunColor * sunCore * 0.14;
          color += vec3(0.68, 0.96, 0.92) * sunBloom * 0.11;
          color += vec3(0.72, 0.93, 0.96) * sunScatter * 0.045;
          color += vec3(0.95, 0.99, 0.96) * sunDapple * 0.20;
          color += vec3(0.74, 0.96, 0.94) * sunDapple * 0.05;

          vec2 rayOrigin = vec2(0.04, 0.44);
          float sourceBand = 1.0 - smoothstep(0.05, 0.18, length((p - vec2(0.03, 0.27)) * vec2(1.0, 3.6)));
          float sharedDapplePulse = 0.72 + 0.28 * (
            0.25 * sin(t * 0.62 + 0.4) +
            0.25 * sin(t * 0.84 + 1.6) +
            0.25 * sin(t * 0.58 + 2.2) +
            0.25 * sin(t * 0.49 + 4.1)
          );
          float swayA = sin(t * 0.62 + 0.4) * 0.032;
          float swayB = sin(t * 0.84 + 1.6) * 0.028;
          float swayC = sin(t * 0.58 + 2.2) * 0.026;
          float swayD = sin(t * 0.49 + 4.1) * 0.034;
          vec2 rayAStart = rayOrigin + vec2(-0.15 + swayA * 0.4, 0.01);
          vec2 rayBStart = rayOrigin + vec2(-0.04 + swayB * 0.35, -0.015);
          vec2 rayCStart = rayOrigin + vec2(0.09 + swayC * 0.3, -0.015);
          vec2 rayDStart = rayOrigin + vec2(0.21 + swayD * 0.4, 0.01);
          vec2 rayAEnd = vec2(-0.62 + swayA, -0.62);
          vec2 rayBEnd = vec2(-0.16 + swayB, -0.96);
          vec2 rayCEnd = vec2(0.12 + swayC, -1.00);
          vec2 rayDEnd = vec2(0.58 + swayD, -0.52);

          float rayAInner = softLine(p, rayAStart, rayAEnd, 0.006, 0.025);
          float rayBInner = softLine(p, rayBStart, rayBEnd, 0.0055, 0.022);
          float rayCInner = softLine(p, rayCStart, rayCEnd, 0.0055, 0.022);
          float rayDInner = softLine(p, rayDStart, rayDEnd, 0.006, 0.025);

          float rayAOuter = softLine(p, rayAStart, rayAEnd, 0.026, 0.11);
          float rayBOuter = softLine(p, rayBStart, rayBEnd, 0.022, 0.10);
          float rayCOuter = softLine(p, rayCStart, rayCEnd, 0.022, 0.10);
          float rayDOuter = softLine(p, rayDStart, rayDEnd, 0.026, 0.11);

          float rayCore = rayAInner + rayBInner + rayCInner + rayDInner;
          float rayGlow = rayAOuter + rayBOuter + rayCOuter + rayDOuter;
          float rays = (rayCore * 1.25 + rayGlow * 0.55) * sourceBand;
          float rayFade = 1.0 - smoothstep(0.00, 1.06, length((p - vec2(0.03, -0.18)) * vec2(0.80, 1.0)));
          float sourceClamp = smoothstep(0.02, 0.11, length((p - vec2(0.03, 0.27)) * vec2(1.15, 2.2)));
          color += vec3(0.94, 0.99, 0.99) * rays * rayFade * sharedDapplePulse * sourceClamp * 0.78;
          color += vec3(0.74, 0.95, 0.99) * rayGlow * rayFade * sharedDapplePulse * sourceClamp * 0.20;

          float jellyTime = t * 0.28;
          float school = 0.0;
          float schoolGlow = 0.0;
          for (int i = 0; i < 8; i++) {
            float fi = float(i);
            float layer = fract(fi * 0.17 + 0.23);
            float drift = jellyTime * (0.24 + layer * 0.12);
            vec2 jellyPos = vec2(
              -0.54 + fi * 0.15 + 0.08 * sin(drift + fi * 1.7),
              -0.58 + mod(drift * 0.22 + fi * 0.19, 1.55)
            );
            jellyPos.y = mod(jellyPos.y + 1.05, 2.10) - 1.05;
            float baseScale = 0.085 + 0.032 * sin(fi * 1.9 + 0.6);
            float bigMultiplier = 1.0;
            if (i == 1) {
              bigMultiplier = 2.0;
            }
            if (i == 4) {
              bigMultiplier = 2.5;
            }
            if (i == 6) {
              bigMultiplier = 3.0;
            }
            float scale = baseScale * bigMultiplier;
            float pulseSpeed = 0.65 + layer * 0.55 + (bigMultiplier - 1.0) * 0.42 + 0.18 * sin(fi * 1.3);
            float pulsePhase = t * pulseSpeed + fi * 1.4;
            float angle = 0.22 * sin(fi * 1.7 + t * 0.18) + 0.10 * cos(fi * 0.9);
            float jelly = jellyfishShape(p + flow * 0.015, jellyPos, scale, pulsePhase, angle);
            float depthFade = 1.0 - smoothstep(0.62, 1.05, length((p - jellyPos) * vec2(0.9, 1.0)));
            float topFade = smoothstep(0.18, -0.38, jellyPos.y);
            float pulseFade = 0.72 + 0.28 * sin(pulsePhase);
            school += jelly * depthFade * pulseFade * topFade;
            schoolGlow += softCircle(p, jellyPos, scale * 0.52, scale * 0.75) * depthFade * pulseFade * topFade;
          }
          school = clamp(school, 0.0, 1.0);
          schoolGlow = clamp(schoolGlow, 0.0, 1.0);
          color += vec3(0.20, 0.68, 0.88) * schoolGlow * 0.10;
          color = mix(color, vec3(0.38, 0.88, 0.98), school * 0.28);
          color += vec3(0.72, 0.96, 1.0) * school * 0.10;

          float sparkleField = fbm((p + flow * 0.35) * 12.0 + vec2(0.0, -t * 0.05));
          float sparkle = smoothstep(0.83, 0.98, sparkleField);
          sparkle *= 0.35 + 0.65 * fbm(p * 16.0 + vec2(t * 0.12, -t * 0.08));
          float bokeh1 = softCircle(p + flow * 0.03, vec2(-0.35, -0.25), 0.12, 0.22) * 0.45;
          float bokeh2 = softCircle(p - flow * 0.05, vec2(0.35, -0.1), 0.09, 0.24) * 0.38;
          float bokeh3 = softCircle(p, vec2(-0.18, 0.3), 0.08, 0.22) * 0.35;
          float floatingLight = sparkle * canopyMask * 0.45 + bokeh1 + bokeh2 + bokeh3;
          color += vec3(0.82, 0.98, 0.96) * floatingLight * 0.16;

          float haze = smoothstep(0.0, 1.0, fbm(p * 2.0 + vec2(4.0, 1.0)));
          color = mix(color, vec3(0.84, 0.96, 0.95), 0.006 + haze * 0.012);

          float bottomBlue = 1.0 - smoothstep(-0.88, -0.54, p.y);
          color = mix(color, vec3(0.04, 0.17, 0.30), bottomBlue * 0.30);

          float vignette = 1.0 - smoothstep(0.18, 1.25, length(p * vec2(0.85, 1.0)));
          color *= 0.93 + vignette * 0.12;

          color = mix(color, pastelPalette((mist + wash + canopyMask) / 2.3), 0.03);
          color = pow(color, vec3(0.9));
          color += vec3(0.03, 0.04, 0.02) * sunBloom * canopyMask * 0.02;

          if (debugMode == 1) {
            gl_FragColor = vec4(vec3(clamp(trunkMask, 0.0, 1.0)), 1.0);
            return;
          }

          if (debugMode == 2) {
            gl_FragColor = vec4(vec3(clamp(canopyMask, 0.0, 1.0)), 1.0);
            return;
          }

          if (debugMode == 3) {
            gl_FragColor = vec4(vec3(clamp(leafShape, 0.0, 1.0)), 1.0);
            return;
          }

          if (debugMode == 4) {
            float sunLayer = clamp(sunCore + sunBloom, 0.0, 1.0);
            gl_FragColor = vec4(vec3(sunLayer), 1.0);
            return;
          }

          if (debugMode == 5) {
            gl_FragColor = vec4(vec3(clamp(floatingLight, 0.0, 1.0)), 1.0);
            return;
          }

          float tone = luminance(color);
          vec2 grainUvA = p * vec2(uResolution.x / uResolution.y, 1.0) * 220.0;
          vec2 grainUvB = p * vec2(uResolution.x / uResolution.y, 1.0) * 340.0;
          float grainA = noise(grainUvA + vec2(t * 0.32, -t * 0.24));
          float grainB = noise(grainUvB + vec2(-t * 0.41, t * 0.29));
          float grainC = fbm((p + flow * 0.015) * 110.0 + vec2(t * 0.05, -t * 0.04));
          float filmGrain = grainA * 0.42 + grainB * 0.38 + grainC * 0.20;
          float grainStrength = 0.028 + (1.0 - tone) * 0.018;
          color += (filmGrain - 0.5) * grainStrength;
          color = mix(color, color * (0.985 + filmGrain * 0.03), 0.18);

          gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
        }
      `
    });

    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
    scene.add(mesh);

    const onResize = () => {
      const width = Math.max(1, composition.clientWidth);
      const height = Math.max(1, composition.clientHeight);
      renderer.setSize(width, height, false);
      uniforms.uResolution.value.set(width, height);
    };

    window.addEventListener("resize", onResize);
    onResize();

    composition.addEventListener("pointermove", (event) => {
      const rect = composition.getBoundingClientRect();
      const x = (event.clientX - rect.left) / rect.width;
      const y = (event.clientY - rect.top) / rect.height;
      uniforms.uMouse.value.set(x, 1.0 - y);
    });

    const startJellyAudio = async () => {
      try {
        jellyAudio.currentTime = 0;
        await jellyAudio.play();
      } catch (error) {
        console.warn("Jellyfish audio could not start automatically.", error);
      }
    };

    window.addEventListener("pointerdown", startJellyAudio, { once: true });

    window.addEventListener("keydown", (event) => {
      if (event.key >= "0" && event.key <= "5") {
        uniforms.debugMode.value = Number(event.key);
      }
    });

    window.setDebugMode = (mode) => {
      uniforms.debugMode.value = Math.max(0, Math.min(5, mode | 0));
    };

    const clock = new THREE.Clock();

    function render() {
      uniforms.uTime.value = clock.getElapsedTime();
      renderer.render(scene, camera);
      requestAnimationFrame(render);
    }

    render();
  </script>
</body>
</html>
